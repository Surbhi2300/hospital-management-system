<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Hospital Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-4">

        <h1 class="text-center text-primary mb-4">
            Hospital Management System
        </h1>

        <form action="/savePatient" method="post">

            <div class="mb-3">
                <label class="form-label">Patient ID</label>
                <input type="text" name="id" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Patient Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" name="age" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Disease</label>
                <input type="text" name="disease" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Ward</label>

                <select name="ward" class="form-control">

                    <option value="ICU">ICU</option>
                    <option value="General">General</option>
                    <option value="Emergency">Emergency</option>

                </select>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    Save Patient
                </button>
            </div>

        </form>

    </div>

    <div class="card shadow-lg p-4 mt-5">

        <h2 class="text-center mb-4">Ward Status</h2>

        <table class="table table-bordered">

            <thead class="table-dark">
                <tr>
                    <th>Ward</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>ICU</td>
                    <td th:text="${icuStatus}"></td>
                </tr>

                <tr>
                    <td>General</td>
                    <td th:text="${generalStatus}"></td>
                </tr>

                <tr>
                    <td>Emergency</td>
                    <td th:text="${emergencyStatus}"></td>
                </tr>

            </tbody>

        </table>

    </div>

    <div class="card shadow-lg p-4 mt-5">

        <h2 class="text-center mb-4">Patient Records</h2>

        <table class="table table-bordered table-hover">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Disease</th>
                    <th>Ward</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="patient : ${patients}">

                    <td th:text="${patient.id}"></td>
                    <td th:text="${patient.name}"></td>
                    <td th:text="${patient.age}"></td>
                    <td th:text="${patient.disease}"></td>
                    <td th:text="${patient.ward}"></td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
